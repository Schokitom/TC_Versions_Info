<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/trimble-connect-workspace-api.js"></script>
    <style>
        body { font-family: 'Open Sans', Arial, sans-serif; margin: 20px; font-size: 14px; color: #333; }
        h2 { color: #0070ad; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: #f4f4f4; text-align: left; padding: 10px; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge { background: #0070ad; color: white; padding: 2px 7px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .loading-msg { color: #666; font-style: italic; }
    </style>
</head>
<body>
    <h2>Projektweite PDF-Versionsübersicht</h2>
    <div id="status" class="loading-msg">Initialisiere Projekt-Scan...</div>
    
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Geändert von</th>
                <th>Letzte Änderung</th>
                <th>Versionen</th>
                <th>Pfad im Projekt</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        TConnect.connect(window.parent).then(api => {
            console.log("Verbunden mit Trimble Connect");
            startScan(api);
        }).catch(err => {
            document.getElementById('status').innerText = "Verbindungsfehler: " + err;
        });

        async function startScan(api) {
            try {
                const project = await api.project.getCurrentProject();
                const statusDiv = document.getElementById('status');
                statusDiv.innerText = `Suche PDF-Dateien in Projekt: ${project.name}...`;

                const allItems = [];
                
                async function fetchRecursive(folderId, currentPath) {
                    const items = await api.project.getProjectItems(folderId);
                    for (const item of items) {
                        if (item.type === "FILE") {
                            // Filter auf .pdf geändert
                            if (item.name.toLowerCase().endsWith(".pdf")) {
                                allItems.push({
                                    name: item.name,
                                    author: item.modifiedBy || "N/A",
                                    date: new Date(item.modifiedOn).toLocaleString('de-DE'),
                                    rev: item.revision || 1,
                                    path: currentPath
                                });
                            }
                        } else if (item.type === "FOLDER") {
                            await fetchRecursive(item.id, currentPath + "/" + item.name);
                        }
                    }
                }

                await fetchRecursive(project.id, "Root");
                renderTable(allItems);

            } catch (error) {
                document.getElementById('status').innerText = "Scan-Fehler: " + error.message;
                console.error(error);
            }
        }

        function renderTable(data) {
            const status = document.getElementById('status');
            const table = document.getElementById('resultTable');
            const body = document.getElementById('tableBody');

            if (data.length === 0) {
                status.innerText = "Keine PDF-Dateien im Projekt gefunden.";
                return;
            }

            status.style.display = "none";
            table.style.display = "table";
            body.innerHTML = "";

            data.forEach(file => {
                const row = `<tr>
                    <td><strong>${file.name}</strong></td>
                    <td>${file.author}</td>
                    <td>${file.date}</td>
                    <td><span class="badge">V${file.rev}</span></td>
                    <td><small>${file.path}</small></td>
                </tr>`;
                body.innerHTML += row;
            });
        }
    </script>
</body>
</html>
