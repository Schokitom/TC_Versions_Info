<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/trimble-connect-workspace-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; color: #333; }
        h2 { color: #0070ad; border-bottom: 2px solid #0070ad; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background-color: #0070ad; color: white; text-align: left; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 13px; }
        tr:hover { background-color: #f5f5f5; }
        .loading { font-style: italic; color: #666; margin-top: 20px; }
        .badge { background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>PDF Datei-Übersicht</h2>
    <div id="status" class="loading">Verbindung zu Trimble Connect wird hergestellt...</div>
    
    <table id="versionTable" style="display:none;">
        <thead>
            <tr>
                <th>Name</th>
                <th>Geändert von</th>
                <th>Letzte Änderung</th>
                <th>Versionen</th>
                <th>Pfad</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        let api;

        TConnect.connect(window.parent).then(workspaceApi => {
            api = workspaceApi;
            document.getElementById('status').innerText = "Suche nach .pdf Dateien im Projekt...";
            loadPdfFiles();
        });

        async function loadPdfFiles() {
            try {
                const project = await api.project.getCurrentProject();
                const rootItems = await api.project.getProjectItems(project.id);
                let pdfFiles = [];

                // Rekursive Funktion zum Durchsuchen aller Ordner
                async function scanItems(items, currentPath) {
                    for (const item of items) {
                        if (item.type === "FILE" && item.name.toLowerCase().endsWith(".pdf")) {
                            pdfFiles.push({ ...item, fullPath: currentPath + "/" + item.name });
                        } else if (item.type === "FOLDER") {
                            const subItems = await api.project.getProjectItems(item.id);
                            await scanItems(subItems, currentPath + "/" + item.name);
                        }
                    }
                }

                await scanItems(rootItems, "Root");
                renderTable(pdfFiles);
            } catch (err) {
                document.getElementById('status').innerText = "Fehler beim Laden: " + err.message;
            }
        }

        function renderTable(files) {
            const status = document.getElementById('status');
            const table = document.getElementById('versionTable');
            const body = document.getElementById('tableBody');

            if (files.length === 0) {
                status.innerText = "Keine .pdf Dateien im Projekt gefunden.";
                return;
            }

            status.style.display = "none";
            table.style.display = "table";
            body.innerHTML = "";

            files.forEach(file => {
                const row = `<tr>
                    <td><strong>${file.name}</strong></td>
                    <td>${file.modifiedBy || 'Unbekannt'}</td>
                    <td>${new Date(file.modifiedOn).toLocaleString('de-DE')}</td>
                    <td><span class="badge">V${file.revision || '1'}</span></td>
                    <td><small>${file.fullPath}</small></td>
                </tr>`;
                body.innerHTML += row;
            });
        }
    </script>
</body>
</html>
