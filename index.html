<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/trimble-connect-workspace-api.js"></script>
    <style>
        body { font-family: sans-serif; font-size: 14px; margin: 10px; }
        .file-row { border-bottom: 1px solid #eee; padding: 5px 0; }
        .version-badge { background: #0070ad; color: white; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <h4>Datei-Versionen</h4>
    <div id="file-list">Warte auf Auswahl im Explorer...</div>

    <script>
        // Initialisierung
        TConnect.connect(window.parent, (event, args) => {
            if (event === "explorer.onSelectionChanged" || event === "extension.onUpdate") {
                fetchSelection();
            }
        }).then(api => {
            window.tcApi = api;
            fetchSelection();
        });

        async function fetchSelection() {
            if (!window.tcApi) return;
            try {
                const selection = await window.tcApi.explorer.getSelection();
                const display = document.getElementById("file-list");
                
                if (!selection || selection.length === 0) {
                    display.innerHTML = "Nichts ausgewählt.";
                    return;
                }

                let html = "";
                selection.forEach(item => {
                    if (item.type === "FILE") {
                        // Wir zeigen die Revision an
                        html += `<div class="file-row">${item.name}: <span class="version-badge">V${item.revision || '1'}</span></div>`;
                    }
                });
                display.innerHTML = html || "Keine Dateien in der Auswahl.";
            } catch (e) {
                console.error("Fehler:", e);
            }
        }
    </script>
</body>
</html>
